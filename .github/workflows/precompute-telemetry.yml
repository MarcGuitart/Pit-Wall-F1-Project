name: Precompute Telemetry Cache

on:
  workflow_dispatch:
    inputs:
      sessions:
        description: 'Session keys to compute (comma-separated, e.g. 9636,9539) or "all"'
        required: false
        default: 'all'
      drivers:
        description: 'Driver codes (comma-separated)'
        required: false
        default: 'VER,NOR,PIA,LEC,RUS,HAM,SAI,ALO,ANT,GAS'
      force:
        description: 'Recompute even if telemetry cache already exists'
        required: false
        default: 'false'
  push:
    paths:
      - 'backend/cache/*/laps.json'

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Cache FastF1 data
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastf1
          key: fastf1-${{ github.run_id }}
          restore-keys: |
            fastf1-

      - name: Run telemetry precomputation
        run: |
          cd backend
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/precompute_telemetry.py \
            --sessions "${{ github.event.inputs.sessions || 'all' }}" \
            --drivers "${{ github.event.inputs.drivers || 'VER,NOR,PIA,LEC,RUS,HAM,SAI,ALO,ANT,GAS' }}" \
            $FORCE_FLAG
        env:
          ENVIRONMENT: ci
          FASTF1_CACHE: ~/.cache/fastf1

      - name: Commit telemetry cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/cache/*/telemetry_*.json
          git diff --staged --quiet || git commit -m "ci: precompute telemetry cache [skip ci]"
          git push
